<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AID Helpdesk — Forgot Password</title>
  <meta name="description" content="Reset your AID Helpdesk password."/>
  <link rel="icon" type="image/png" href="/logo.png"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0e1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1830;
      border: 1px solid #2d2b4e;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; }
    .logo-text { font-size: 22px; font-weight: 700; color: #e2e8f0; letter-spacing: -0.5px; }
    .logo-text span { color: #818cf8; font-weight: 400; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #64748b; margin-bottom: 32px; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #94a3b8; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px;
      background: #0f0e1a; border: 1px solid #2d2b4e;
      border-radius: 8px; color: #e2e8f0;
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #6366f1; }
    .error {
      background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: #fca5a5; margin-bottom: 20px;
    }
    .success {
      background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25);
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: #86efac; margin-bottom: 20px;
    }
    button[type="submit"] {
      width: 100%; padding: 11px; background: #6366f1;
      border: none; border-radius: 8px;
      color: #fff; font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.15s; margin-top: 4px;
    }
    button[type="submit"]:hover { background: #4f46e5; }
    .footer {
      margin-top: 32px; padding-top: 24px;
      border-top: 1px solid #2d2b4e;
      font-size: 12px; color: #475569; text-align: center;
    }
    .footer a { color: #818cf8; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/logo.png" alt="AID" style="width:52px;height:52px;object-fit:contain;"/>
      <div class="logo-text">AID <span>Helpdesk</span></div>
    </div>

    <h1>Forgot password?</h1>
    <p class="subtitle">Enter your email and we'll send you a reset link — expires in 1 hour.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="success">{{ success }}</div>
    {% endif %}

    {% if not success %}
    <form method="POST">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" required autofocus/>
      </div>
      <button type="submit">Send reset link</button>
    </form>
    {% endif %}

    <div class="footer">
      <a href="/login">← Back to Sign in</a>
    </div>
  </div>
</body>
</html>
