<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AID Helpdesk — Page not found</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0e1a; color: #e2e8f0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .code { font-size: 6rem; font-weight: 900; color: rgba(99,102,241,0.25); line-height: 1; margin-bottom: 12px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 14px; color: #94a3b8; margin-bottom: 28px; }
    a {
      display: inline-block; padding: 10px 24px; border-radius: 8px;
      background: #6366f1; color: #fff; text-decoration: none; font-weight: 600;
      font-size: 14px; transition: background 0.2s;
    }
    a:hover { background: #818cf8; }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has moved.</p>
    <a href="/">← Back to home</a>
  </div>
</body>
</html>
