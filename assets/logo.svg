<svg width="100%" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>AD Helpdesk</title>
  <desc>AD Helpdesk logo - a shield with AID, followed by the product name and tagline</desc>

  <!-- Shield body -->
  <path d="M140 52 L196 52 L196 162 Q140 200 84 162 L84 52 Z"
        fill="#1e1b4b" stroke="#6366f1" stroke-width="2.5"/>

  <!-- Shield top accent bar -->
  <rect x="84" y="52" width="112" height="8" fill="#6366f1" opacity="0.5"/>

  <!-- AID text inside shield - custom paths, open D has no closing vertical stroke -->
  <g stroke="#c7d2fe" stroke-width="7" stroke-linecap="round" fill="none">
    <!-- A -->
    <line x1="107" y1="98" x2="92"  y2="148"/>
    <line x1="107" y1="98" x2="122" y2="148"/>
    <line x1="97"  y1="131" x2="117" y2="131"/>

    <!-- I -->
    <line x1="139" y1="98" x2="139" y2="148"/>

    <!-- D (open — arc only, no right vertical stroke) -->
    <line x1="156" y1="98" x2="156" y2="148"/>
    <path d="M 156 98 Q 185 123 156 148"/>
  </g>

  <!-- Underline inside shield -->
  <rect x="97" y="155" width="86" height="2.5" rx="1.5" fill="#6366f1" opacity="0.7"/>

  <!-- "AD" prefix label -->
  <text x="230" y="100"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="24" font-weight="400" fill="#818cf8" letter-spacing="2">AD</text>

  <!-- "Helpdesk" main wordmark -->
  <text x="230" y="138"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="42" font-weight="700" fill="#e2e8f0" letter-spacing="-1">Helpdesk</text>

  <!-- Tagline -->
  <text x="230" y="162"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="14" font-weight="400" fill="#64748b" letter-spacing="0.5">Plug Claude into your Active Directory</text>

  <!-- Decorative dots -->
  <circle cx="230" cy="185" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="242" cy="185" r="3" fill="#6366f1" opacity="0.3"/>
  <circle cx="254" cy="185" r="3" fill="#6366f1" opacity="0.15"/>
</svg>
